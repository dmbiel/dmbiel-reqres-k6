name: k6 API Performance Tests

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - README.md
      - docs/**
      - baselines/**
      - CONTRIBUTING.md
      - .env.example
      - LICENSE
      - .github/pull_request_template.md
      - .github/ISSUE_TEMPLATE/**
  workflow_dispatch:
    inputs:
      scenario:
        description: k6 scenario to run
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Static validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -name "*.js" -not -path "./node_modules/*" -print0)

      - name: Validate k6 scenario options
        shell: bash
        run: |
          for scenario in scenarios/*.js; do
            echo "Inspecting $scenario"
            k6 inspect "$scenario" > /dev/null
          done

      - name: Validate baseline comparison behavior
        shell: bash
        run: npm run validate:baseline-comparison

  k6-tests:
    name: Run k6 tests
    runs-on: ubuntu-latest
    needs: static-validation
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    env:
      REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
      ENVIRONMENT: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Select scenario
        id: scenario
        shell: bash
        run: |
          SCENARIO="${{ github.event.inputs.scenario }}"
          if [ -z "$SCENARIO" ]; then
            SCENARIO="smoke"
          fi
          echo "scenario=$SCENARIO" >> "$GITHUB_OUTPUT"

      - name: Validate API key secret
        shell: bash
        run: |
          if [ -z "$REQRES_API_KEY" ]; then
            echo "::error::REQRES_API_KEY GitHub secret is required"
            exit 1
          fi

      - name: Preflight ReqRes quota check
        shell: bash
        run: |
          response_file="$(mktemp)"
          status_code="$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -H "x-api-key: $REQRES_API_KEY" \
              -H "X-Reqres-Env: prod" \
              -H "User-Agent: dmbiel-reqres-k6/1.0" \
              "https://reqres.in/api/users?page=1"
          )"

          if [ "$status_code" = "429" ]; then
            reset_at="$(
              node -e "const fs = require('fs'); const body = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(body.current_usage?.resets_at || 'unknown');" "$response_file"
            )"
            echo "::error::ReqRes daily quota is exhausted. Reset at: $reset_at. Wait for reset before rerunning CI or manual load scenarios."
            exit 1
          fi

          if [ "$status_code" = "401" ] || [ "$status_code" = "403" ]; then
            echo "::error::ReqRes rejected the request with HTTP $status_code. Check the REQRES_API_KEY secret."
            exit 1
          fi

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "::error::ReqRes preflight request returned unexpected HTTP $status_code."
            cat "$response_file"
            exit 1
          fi

      - name: Run k6 scenario
        id: k6
        shell: bash
        run: |
          mkdir -p results
          k6 run \
            --summary-export "results/k6-summary-${{ steps.scenario.outputs.scenario }}.json" \
            "scenarios/${{ steps.scenario.outputs.scenario }}.js"

      - name: Publish k6 step summary
        if: always()
        shell: bash
        env:
          SCENARIO_NAME: ${{ steps.scenario.outputs.scenario }}
          K6_SUMMARY_FILE: results/k6-summary-${{ steps.scenario.outputs.scenario }}.json
        run: node scripts/writeK6Summary.js

      - name: Compare k6 summary with baseline
        if: always()
        shell: bash
        env:
          SCENARIO_NAME: ${{ steps.scenario.outputs.scenario }}
          K6_CURRENT_SUMMARY_FILE: results/k6-summary-${{ steps.scenario.outputs.scenario }}.json
          K6_BASELINE_SUMMARY_FILE: baselines/k6-summary-${{ steps.scenario.outputs.scenario }}.baseline.json
        run: node scripts/compareK6Summary.js

      - name: Upload k6 summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-summary-${{ steps.scenario.outputs.scenario }}
          path: results/*.json
          if-no-files-found: warn
